name: CI

on:
  push:
    branches:
      - main
    pull_request:
      branches:
        - main

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ehr_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ehr_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/ehr_db
      OPENAI_API_KEY: dummy-ci-key
      API_TOKEN: dummy-ci-token
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run database migrations
        run: |
          alembic -c backend/alembic.ini upgrade head

      - name: Seed database
        run: |
          python -m backend.seeder

      - name: Backend import check
        run: |
          python -c "from backend.main import app; print('Backend import successful')"

      - name: Run backend tests
        run: |
          pytest
        
  
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      VITE_API_BASE_URL: http://127.0.0.1:8000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build